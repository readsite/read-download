<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>Read.小读 · 静心阅读，每日一歌一句一文</title>
    <meta name="description" content="Read.小读 是一款专注深度阅读与音乐收藏的安卓应用。在安静的时光里，一字一文，享受纯粹阅读与旋律之美。免费下载，静心慢读。">
    <meta name="keywords" content="阅读app,每日音乐,句子收藏,深度文章,安卓阅读器,Read下载,静心阅读">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
              -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
    -webkit-text-size-adjust: 100%;
    -ms-text-size-adjust: 100%;
            background-color: #FAFAFA;
            font-family: 'Georgia', 'Times New Roman', 'Songti SC', '宋体', serif;
            color: #1e1e1e;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #eaeaea;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .hero {
            text-align: center;
            padding: 2.5rem 1rem 2rem;
            background: #fff;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #1e1e1e 0%, #4a4a4a 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero p{
            font-size: 0.75rem;
            color: #6b6b6b;
            margin-top: 0.5rem;
        }
        .hero .tagline {
            font-size: 1rem;
            color: #6c6c6c;
            margin-bottom: 1.8rem;
            font-style: italic;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #000;
            color: #fff;
            padding: 0.9rem 2.2rem;
            font-size: 1.1rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            text-decoration: none;
            font-family: inherit;
        }
        .download-btn:active {
            transform: scale(0.96);
            background: #2c2c2c;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 2rem;
            margin: 2rem 0 2.5rem;
        }
        .feature-card {
            background: #fff;
            padding: 1rem;
            transition: all 0.25s ease;
        }
        .feature-header {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .feature-header i {
            font-size: 1.9rem;
            color: #1e1e1e;
        }
        .feature-header h3 {
            font-size: 1.3rem;
            font-weight: 500;
            margin: 0;
        }
        .feature-card p {
            color: #666;
            font-size: 0.9rem;
        }

        .screenshots {
            background: #fff;
            padding: 1.8rem 1.5rem 1.2rem 1.5rem;
            margin: 1rem 0 1.5rem;
        }
        .screenshots h2 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 0.2rem;
        }

        /* 原生滚动 + 流畅惯性 */
        .screenshot-scroll {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            gap: 1.5rem;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;   /* iOS 惯性滚动 */
            scroll-behavior: smooth;
            padding-bottom: 12px;
            cursor: default;  /* 移除抓取光标，保持原生 */
        }

        .mock-card {
            flex: 0 0 auto;
            width: 210px;
            background: #fff;
            scroll-snap-align: start;
            overflow: hidden;
        }
        .mock-img {
            width: 100%;
            aspect-ratio: 9 / 16;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .mock-img img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }
        .mock-caption {
            padding: 0.7rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c2c2c;
            background: #fff;
            text-align: center;
        }
        .mock-caption i {
            font-size: 0.8rem;
            margin-right: 4px;
            opacity: 0.7;
        }

        .extra-info {
            background: #fff;
            padding: 1.5rem;
            margin: 1.5rem 0 1rem;
            text-align: center;
        }
        .contact-email {
            font-family: monospace;
            background: #f7f7f7;
            padding: 0.2rem 0.8rem;
            display: inline-block;
            cursor: pointer;
        }
        .contact-email:active {
            background: #e8e8e8;
        }

        .footer {
            background: #fff;
            padding: 1.6rem;
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            margin-top: 2rem;
        }
        .footer a {
            color: #555;
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .footer a:active {
            color: #000;
        }

        @media (max-width: 700px) {
            .container {
                padding: 1rem;
            }
            .hero h1 {
                font-size: 2.3rem;
            }
            .mock-card {
                width: 170px;
            }
            .feature-card {
                padding: 1rem;
            }
            .download-btn {
                padding: 0.75rem 1.8rem;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .mock-card {
                width: 150px;
            }
            .features {
                gap: 1rem;
            }
        }

        .download-btn:focus-visible {
            outline: 2px solid #000;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>Read.小读</h1>
        <div class="tagline">安于闲，乐于独 · 藏在时光里的无尽地带</div>
        <button class="download-btn" id="androidDownloadBtn">
            <i class="ri-android-line"></i> 安卓下载 · 立即体验
        </button>
        <p><i class="ri-shield-check-line"></i> 无广告 · 无社交干扰 · 纯粹阅读体验</p>
    </div>

    <div class="features">
        <div class="feature-card">
            <div class="feature-header">
                <i class="ri-headphone-line"></i>
                <h3>每日音乐</h3>
            </div>
            <p>每日甄选独立旋律</p>
        </div>
        <div class="feature-card">
            <div class="feature-header">
                <i class="ri-article-line"></i>
                <h3>句子收藏</h3>
            </div>
            <p>书影诗文心动短句</p>
        </div>
        <div class="feature-card">
            <div class="feature-header">
                <i class="ri-newspaper-line"></i>
                <h3>深度文章</h3>
            </div>
            <p>文学哲思,艺术生活</p>
        </div>
    </div>

    <div class="screenshots">
        <h2><i class="ri-image-line" style="font-size: 1.4rem;"></i> 应用预览</h2>
        <div class="screenshot-scroll" id="screenshotScroll">
            <div class="mock-card">
                <div class="mock-img">
                    <img src="img/banner0.png" alt="音乐播放界面 · 沉浸旋律" loading="lazy">
                </div>
                <div class="mock-caption">
                    <i class="ri-headphone-line"></i> 每日音乐 · 沉浸聆听
                </div>
            </div>
            <div class="mock-card">
                <div class="mock-img">
                    <img src="img/banner1.png" alt="句子收藏 · 珍藏心动文字" loading="lazy">
                </div>
                <div class="mock-caption">
                    <i class="ri-bookmark-line"></i> 句子收藏 · 一字一句
                </div>
            </div>
            <div class="mock-card">
                <div class="mock-img">
                    <img src="img/banner2.png" alt="深度文章 · 沉浸式排版" loading="lazy">
                </div>
                <div class="mock-caption">
                    <i class="ri-file-text-line"></i> 深度文章 · 静心慢读
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Read.小读 · 个人开发者 coveyo</p>
        <p>
            <a href="privacy.html" target="_blank" rel="noopener">隐私政策</a> | 
            <a href="terms.html" target="_blank" rel="noopener">用户协议</a>
        </p>
    </div>
</div>

<script>
    (function() {
        // 下载按钮
        const downloadBtn = document.getElementById('androidDownloadBtn');
        if (downloadBtn) {
            downloadBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = "https://github.com/readsite/read-download/releases/download/0.0.2/Read.apk";
            });
        }

        // 禁止图片拖拽
        const allImgs = document.querySelectorAll('.mock-img img');
        allImgs.forEach(img => {
            img.addEventListener('dragstart', (e) => e.preventDefault());
        });

        // 图片加载失败占位（静默）
        document.querySelectorAll('.mock-img img').forEach(img => {
            img.addEventListener('error', () => {
                img.style.opacity = '0.6';
            });
        });

        // 按钮触摸反馈
        const btn = document.getElementById('androidDownloadBtn');
        if (btn) {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.97)';
            }, { passive: true });
            btn.addEventListener('touchend', () => {
                btn.style.transform = '';
            });
        }

        // 页面淡入
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.2s ease';
        window.addEventListener('load', () => {
            document.body.style.opacity = '1';
        });
    })();
</script>
</body>
</html>
