<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>Read.</title>
    <link href="img/favicon.png" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            -webkit-text-size-adjust: 100%;
            background-color: #ffffff;
            font-family: 'Georgia', 'Times New Roman', 'FeiHuaSongTi', '宋体', 'Songti SC', serif;
            color: #111;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .download-wrapper {
            margin: auto; 
            width: 100%;
            max-width: 720px;
            padding: 2rem 1.5rem;
            transition: all 0.2s ease;
        }
        .hero-card {
            background: #ffffff;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.04), 0 0 0 1px #efefef;
            padding: 2rem 1.75rem;
            border-radius: 0; 
            transition: box-shadow 0.2s;
        }

        .app-name {
            font-size: 2rem;
            font-weight: 550;
            text-align: center;
            margin: 1rem 0 0.5rem 0;
            letter-spacing: -0.3px;
        }
        .tagline {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #f2f2f2;
            padding-bottom: 1.2rem;
        }
        .feature-grid {
            display: grid;
            gap: 1.5rem 1rem;
            margin: 1.8rem 0 1.5rem;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .feature-icon {
            width: 44px;
            height: 44px;
            background: #fafafa;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
            font-size: 1.4rem;
            border-radius: 0;
            transition: background 0.2s;
        }
        .feature-text h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }
        .feature-text p {
            font-size: 0.8rem;
            color: #777;
            line-height: 1.4;
        }

        .download-section {
            margin: 2rem 0 0.5rem;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1rem;
        }
        .download-btn {
            min-width: 220px;
            background: #000000;
            color: white;
            border: none;
            padding: 0.9rem 1.8rem;
            font-size: 1rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            text-decoration: none;
            letter-spacing: 0.3px;
        }
        .download-btn i {
            font-size: 1.3rem;
            color: white;
        }
        .download-btn:active {
            transform: scale(0.96);
            background: #222;
        }
        .info-footnote {
            text-align: center;
            margin-top: 2rem;
            color: #999;
            font-size: 0.7rem;
            padding-top: 0.8rem;
            border-top: 1px solid #f0f0f0;
        }
        .info-footnote p {
            margin: 0.2rem 0;
        }
        @media (max-width: 560px) {
            .download-wrapper {
                padding: 1.2rem 1rem;
            }
            .hero-card {
                padding: 1.5rem 1.2rem;
            }
            .feature-grid {
                gap: 1.2rem;
            }
            .download-btn {
                width: 100%;
                min-width: unset;
                padding: 0.85rem 1rem;
            }
            .app-name {
                font-size: 1.8rem;
                margin-top: 0.5rem;
            }
            .tagline {
                font-size: 0.85rem;
            }
            .feature-icon {
                width: 40px;
                height: 40px;
                font-size: 1.25rem;
            }
        }
        @media (max-height: 600px) {
            .download-wrapper {
                margin: 1rem auto;
            }
        }
        .toast-message {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) scale(0.92);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-size: 0.8rem;
            z-index: 1200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            white-space: nowrap;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            letter-spacing: 0.2px;
        }
        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .hero-card {
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        @media (hover: hover) {
            .hero-card:hover {
                box-shadow: 0 20px 36px rgba(0, 0, 0, 0.04), 0 0 0 1px #e8e8e8;
            }
        }
    </style>
</head>
<body>

<div class="download-wrapper">
    <div class="hero-card">
        <div class="app-name">Read.</div>
        <div class="tagline">安于闲，乐于独 &nbsp;&nbsp;藏在时光里的无尽地带</div>
        <div class="feature-grid">
            <div class="feature-item">
                <div class="feature-icon"><i class="ri-headphone-line"></i></div>
                <div class="feature-text">
                    <h4>每日音乐</h4>
                    <p>一首旋律，沉浸私人时刻</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="ri-article-line"></i></div>
                <div class="feature-text">
                    <h4>句子收藏</h4>
                    <p>字句如光，照亮庸常</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="ri-newspaper-line"></i></div>
                <div class="feature-text">
                    <h4>深度文章</h4>
                    <p>一字一文，静心慢读</p>
                </div>
            </div>
        </div>
        <div class="download-section">
            <div class="btn-group">
                <button class="download-btn" id="androidBtn">
                    <i class="ri-android-line"></i>安卓下载
                </button>
            </div>
        </div>
        <div class="info-footnote">
            <p>© 2026 Read.</p>
        </div>
    </div>
</div>

<script>
    (function() {
        function showMessage(text, duration = 2000) {
            let toast = document.querySelector('.toast-message');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast-message';
                document.body.appendChild(toast);
            }
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        const androidBtn = document.getElementById('androidBtn');
        if (androidBtn) {
            androidBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showMessage('✨ Android 版本即将开放，静候相遇', 1800);
                // window.location.href = "https://readapp.com/download/read.apk";
            });
        }
    })();
</script>
</body>
</html>
