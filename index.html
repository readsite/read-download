<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Read. · 移动应用下载</title>
    <link href="img/favicon.png" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* ========== 重置 & 基础风格 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: 'Georgia', 'Times New Roman', 'FeiHuaSongTi', '宋体', 'Songti SC', serif;
            color: #111;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 柔和的页面容器 */
        .download-wrapper {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* ========== 导航 / 头部 (极简延续原站气息) ========== */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: #000;
            text-decoration: none;
        }
        .back-link {
            font-size: 0.9rem;
            color: #666;
            text-decoration: none;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-link i {
            font-size: 1rem;
        }
        .back-link:hover,
        .back-link:active {
            color: #000;
        }

        /* ========== 主卡片 (延续原站.card风格) ========== */
        .hero-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.03), 0 0 0 1px #f1f1f1;
            padding: 2rem 1.75rem;
            margin-bottom: 2rem;
            transition: box-shadow 0.2s;
        }

        /* 应用图标区 */
        .app-icon {
            text-align: center;
            margin-bottom: 1.2rem;
        }
        .icon-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);

        }
        .icon-circle img {
			width: 5rem;
        }

        .app-name {
            font-size: 2rem;
            font-weight: 550;
            text-align: center;
            margin: 0.5rem 0 0.2rem;
            letter-spacing: -0.3px;
        }
        .tagline {
            text-align: center;
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #f5f5f5;
            padding-bottom: 1.2rem;
        }

        /* 功能列表 (网格) */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem 1rem;
            margin: 1.8rem 0 1.2rem;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .feature-icon {
            width: 36px;
            height: 36px;
            background: #f8f8f8;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.3rem;
        }
        .feature-text h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .feature-text p {
            font-size: 0.8rem;
            color: #777;
        }

        /* 下载区域 - 单按钮居中 */
        .download-section {
            margin: 2rem 0 1rem;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .download-btn {
            min-width: 200px;
            background: #000;
            color: white;
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 44px;
            font-size: 1rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            text-decoration: none;
        }
        .download-btn i {
            font-size: 1.3rem;
            color: white;
        }
        .download-btn:active {
            transform: scale(0.97);
            background: #222;
        }

        /* 二维码模拟卡片 */
        .qr-area {
            text-align: center;
            margin-top: 1rem;
            padding-top: 1.2rem;
            border-top: 1px solid #f0f0f0;
        }
        .qr-placeholder {
            display: inline-block;
            background: #fafafa;
            border-radius: 24px;
            padding: 0.8rem;
            border: 1px solid #ececec;
        }
        .qr-sim {
            width: 128px;
            height: 128px;
            background: repeating-linear-gradient(45deg, #111 0px, #111 4px, #eee 4px, #eee 12px);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            background-image: linear-gradient(45deg, #ddd 25%, transparent 25%),
                              linear-gradient(-45deg, #ddd 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #ddd 75%),
                              linear-gradient(-45deg, transparent 75%, #ddd 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            position: relative;
        }
        .qr-sim i {
            font-size: 2.2rem;
            background: white;
            padding: 8px;
            border-radius: 50%;
            color: #000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .qr-label {
            font-size: 0.7rem;
            color: #888;
            margin-top: 8px;
        }

        /* 版本/版权 提示 (沿用原站.state样式) */
        .info-footnote {
            text-align: center;
            margin-top: 2rem;
            color: #999;
            font-size: 0.7rem;
            border-top: 1px solid #f1f1f1;
            padding-top: 1.5rem;
        }
        .info-footnote p {
            margin: 0.2rem 0;
        }

        /* 响应式调整 */
        @media (max-width: 500px) {
            .download-wrapper {
                padding: 1.2rem 1rem 3rem;
            }
            .hero-card {
                padding: 1.5rem;
            }
            .feature-grid {
                gap: 1rem;
            }
            .download-btn {
                width: 100%;
                min-width: unset;
            }
            .app-name {
                font-size: 1.8rem;
            }
        }

        /* 轻提示toast (与原站toast风格一致) */
        .toast-message {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            white-space: nowrap;
        }
        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
    </style>
</head>
<body>

<div class="download-wrapper">
    <!-- 极简导航栏，与原网站顶部氛围呼应 -->
    <div class="nav-bar">
        <a class="logo" id="homeRedirect">Read.</a>
    </div>

    <!-- 主要内容卡片区 -->
    <div class="hero-card">
        <div class="app-icon">
            <div class="icon-circle">
                <img src="img/icon-192.png"/>
            </div>
        </div>
        <div class="app-name">Read.</div>
        <div class="tagline">安于闲，乐于独 · 藏在时光里的无尽地带</div>

        <!-- 功能亮点，摘取原站核心气质 -->
        <div class="feature-grid">
            <div class="feature-item">
                <div class="feature-icon"><i class="ri-headphone-line"></i></div>
                <div class="feature-text">
                    <h4>每日音乐</h4>
                    <p>一首旋律，沉浸私人时刻</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="ri-article-line"></i></div>
                <div class="feature-text">
                    <h4>句子收藏</h4>
                    <p>字句如光，照亮庸常</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="ri-newspaper-line"></i></div>
                <div class="feature-text">
                    <h4>深度文章</h4>
                    <p>一字一文，静心慢读</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="ri-heart-2-line"></i></div>
                <div class="feature-text">
                    <h4>我的珍藏</h4>
                    <p>一键收藏，随时回味</p>
                </div>
            </div>
        </div>

        <!-- 下载操作区 - 仅保留Android按钮 -->
        <div class="download-section">
            <div class="btn-group">
                <button class="download-btn" id="androidBtn">
                    <i class="ri-android-line"></i> Android 下载
                </button>
            </div>
            <div class="qr-area">
                <div class="qr-placeholder">
                    <div class="qr-sim">
                        <i class="ri-qr-code-line"></i>
                    </div>
                    <div class="qr-label">扫描二维码下载移动版</div>
                </div>
                <p style="font-size: 0.7rem; color: #aaa; margin-top: 12px;">版本 V1.0.0 · 适配 Android</p>
            </div>
        </div>
    </div>

    <!-- 额外说明：延续原站侧边栏底部文案风格 -->
    <div class="info-footnote">
        <p>本站部分素材来自网络收集，侵权请联系删除</p>
        <p>© Read. · 栖居于时光角落</p>
    </div>
</div>

<script>
    (function() {
        // 轻提示函数
        function showMessage(text, duration = 2000) {
            let toast = document.querySelector('.toast-message');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast-message';
                document.body.appendChild(toast);
            }
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // Android 下载按钮事件（演示交互，可替换为真实下载链接）
        const androidBtn = document.getElementById('androidBtn');
        const homeLogo = document.getElementById('homeRedirect');

        if (androidBtn) {
            androidBtn.addEventListener('click', (e) => {
                e.preventDefault();
                // 实际项目可替换为真实 .apk 链接，此处演示提示
                showMessage('✨ Android 版本即将开放，敬请期待', 1800);
                // 真实下载: window.location.href = "https://yourdomain.com/app.apk";
            });
        }

        // Logo 点击回到主页
        if (homeLogo) {
            homeLogo.addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = window.location.origin + '/';
            });
        }

        // 二维码点击模拟提示
        const qrBox = document.querySelector('.qr-sim');
        if (qrBox) {
            qrBox.style.cursor = 'pointer';
            qrBox.addEventListener('click', () => {
                showMessage('📱 使用相机扫码即可下载 Read. App', 1500);
            });
        }

        // 页面显示时保持干净
        window.addEventListener('pageshow', () => {});
    })();
</script>

<style>
    /* 优雅微调 */
    .hero-card {
        transition: transform 0.2s ease, box-shadow 0.2s;
    }
    .hero-card:hover {
        box-shadow: 0 18px 32px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px #eaeaea;
    }
    .download-btn {
        letter-spacing: 0.3px;
    }
    .feature-icon {
        transition: background 0.2s;
    }
    .feature-item:hover .feature-icon {
        background: #f0f0f0;
    }
    .logo {
        position: relative;
        display: inline-block;
    }
    .logo::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 100%;
        height: 1.5px;
        background: #000;
        transform: scaleX(0.4);
        transform-origin: left;
        transition: transform 0.2s;
    }
    .logo:hover::after {
        transform: scaleX(0.7);
    }
    @media (max-width: 480px) {
        .hero-card {
            border-radius: 24px;
        }
    }
    .qr-sim i {
        transition: transform 0.2s;
    }
    .qr-sim:hover i {
        transform: scale(1.05);
    }
    body {
        text-rendering: optimizeLegibility;
    }
    a, button {
        -webkit-tap-highlight-color: transparent;
    }
</style>
</body>
</html>
